name: Build and Deploy via GHCR

on:
  push:
    branches: [main]
    paths:
      - "polymarket-bot/**"
      - ".github/workflows/deploy-ssh.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/polymarket-bot:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./polymarket-bot
          file: ./polymarket-bot/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository }}/polymarket-bot:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Preflight check on remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 2m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f "docker-compose.server.yml" ]; then
              echo "docker-compose.server.yml not found in DEPLOY_PATH"
              exit 1
            fi

      - name: Login to GHCR on remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 2m
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Pull app images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            APP_IMAGE="${{ needs.build.outputs.image }}"
            for attempt in 1 2 3; do
              echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Pull attempt ${attempt}/3: ${APP_IMAGE}"
              if docker pull "${APP_IMAGE}"; then
                echo "Image pull succeeded"
                exit 0
              fi
              if [ "${attempt}" -lt 3 ]; then
                echo "Image pull failed, retrying in 10s..."
                sleep 10
              fi
            done
            echo "Image pull failed after 3 attempts"
            exit 1

      - name: Diagnose image and docker disk usage
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 2m
          script: |
            set -euo pipefail
            APP_IMAGE="${{ needs.build.outputs.image }}"
            echo "Inspecting pulled image: ${APP_IMAGE}"
            docker image ls --digests | rg "polymarket-bot|REPOSITORY|${APP_IMAGE##*:}" || true
            echo "Docker disk usage:"
            docker system df

      - name: Restart services with new image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            APP_IMAGE="${{ needs.build.outputs.image }}" docker compose -f docker-compose.server.yml up -d --remove-orphans

      - name: Run migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 3m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            APP_IMAGE="${{ needs.build.outputs.image }}" docker compose -f docker-compose.server.yml exec -T app alembic upgrade head

      - name: Healthcheck
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 2m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "Checking app health endpoint..."
            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${API_PORT:-8000}/health" >/dev/null; then
                echo "Healthcheck passed"
                exit 0
              fi
              echo "Waiting for app health ($i/20)..."
              sleep 3
            done
            echo "Healthcheck failed after retries. Recent app logs:"
            docker compose -f docker-compose.server.yml logs --tail=200 app
            exit 1
