name: Build and Deploy via GHCR

on:
  push:
    branches: [main]
    paths:
      - "polymarket-bot/**"
      - ".github/workflows/deploy-ssh.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/polymarket-bot:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./polymarket-bot
          file: ./polymarket-bot/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository }}/polymarket-bot:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            cd polymarket-bot
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            APP_IMAGE="${{ needs.build.outputs.image }}" docker compose -f docker-compose.server.yml pull app worker beat
            APP_IMAGE="${{ needs.build.outputs.image }}" docker compose -f docker-compose.server.yml up -d --remove-orphans
            APP_IMAGE="${{ needs.build.outputs.image }}" docker compose -f docker-compose.server.yml exec -T app alembic upgrade head
            curl -fsS "http://127.0.0.1:${API_PORT:-8000}/health"
